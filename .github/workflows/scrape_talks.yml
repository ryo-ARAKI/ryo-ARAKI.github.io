name: Scrape Talk Locations

on:
  push:
    paths:
      - '_talks/**'
      - 'talkmap.ipynb'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'  # Specify the Python version you need

    - name: Install dependencies
      run: |
        pip install jupyter pandas requests beautifulsoup4 geopy  # Add other dependencies as needed
        pip install getorg --upgrade

    - name: Run Jupyter Notebook
      working-directory: _talks
      run: |
        jupyter nbconvert --to notebook --execute ../talkmap.ipynb --output-dir .. --output talkmap_out.ipynb

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add talkmap/map.html talkmap/org-locations.js
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Automated update of talk locations"
          git push
        fi

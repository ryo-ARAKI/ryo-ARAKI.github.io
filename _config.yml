# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the
# server process.

# Basic Site Settings
locale: "en-US"
site_theme: "default"
title: "ARAKI Ryo"
title_separator: "-"
name: &name "ARAKI Ryo"
description: &description "Researcher on fluid dynamics and turbulence"
url: https://ryo-araki.github.io # the base hostname & protocol for your site e.g. "https://[your GitHub username].github.io"
baseurl: "" # the subpath of your site, e.g. "/blog"
repository: "ryo-ARAKI/ryo-ARAKI.github.io"

# Site Author - The following control what appear as part of the author content on the side bar.
#               If a field is blank the icon and link will not appear, otherwise it will be shown.
#               Additional customization can be done by editing /_includes/author-profile.html
author:
  # Biographic information
  avatar: "Profile_EFMC.png"
  name: "ARAKI Ryo"
  pronouns: # example: "she/her"
  bio: "Researcher on turbulence"
  location: "Chiba, Japan"
  employer: "Tokyo University of Science"
  uri: # URL
  email: "araki.ryo@rs.tus.ac.jp"

  # Academic websites
  arxiv: # URL - Update with the correct link to your profile
  googlescholar: # "https://scholar.google.com/citations?user=PS_CX0AAAAAJ"
  impactstory: # URL
  orcid: "https://orcid.org/0000-0003-1700-0392"
  semantic: # URL
  pubmed: # "https://www.ncbi.nlm.nih.gov/pubmed/?term=john+snow"
  researchgate: # URL
  scopus: # URL

  # Repositories and software development
  bitbucket: # Username - Update with your username on the site
  codepen: # Username
  dribbble: # Username
  github: # "academicpages"
  kaggle: # Username
  stackoverflow: # User number or user number and name (i.e., use "1" or "1/jeff-atwood")

  # Social media
  bluesky: # "bsky.app" # Replace this with you Bluesky username
  facebook: # Username
  flickr: # Username
  foursquare: # Username
  goodreads: # Username
  google_plus: # Username
  keybase: # Username
  instagram: # Username
  lastfm: # Username
  linkedin: # Username
  mastodon: # URL
  medium: # URL
  pinterest: # Username
  soundcloud: # Username
  steam: # Username
  telegram: # URL
  tumblr: # Username
  twitter: # Username for X / Twitter
  vine: # Username
  weibo: # Username
  wikipedia: # Username
  xing: # Username
  youtube: # Username
  zhihu: # Username


# Site Settings
teaser: # filename of teaser fallback teaser image placed in /images/, .e.g. "500x300.png"
breadcrumbs: false # true, false (default)
words_per_minute: 160
future: true
read_more: "disabled" # if enabled, adds "Read more" links to excerpts
comments: false
atom_feed:
  hide: false # change to true to hide the RSS feed in the footer
  path: # blank (default) uses feed.xml

# SEO Related
google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:

# Social Sharing
twitter:
  username: &twitter
facebook:
  username:
  app_id:
  publisher:
og_image: # Open Graph/Twitter default site image
og_description: # Open Graph/Twitter default site description
# For specifying social profiles
# - https://developers.google.com/structured-data/customize/social-profiles
social:
  type: # Person or Organization (defaults to Person)
  name: # If the user or organization name differs from the site's name
  links: # An array of links to social media profiles

# Analytics
analytics: false

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - CONTRIBUTING.md
  - Dockerfile
  - docker-compose.yaml
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - package-lock.json
  - Rakefile
  - README
  - README.md
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  memo:
    output: true
    permalink: /:collection/:path/

# These settings control how pages and collections are included in the site
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _memo
  - scope:
      path: ""
      type: memo
    values:
      layout: single
      author_profile: true
      share: true
      related: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Outputting
permalink: /:categories/:title/
# paginate: 5 # amount of posts to show
# paginate_path: /page:num/
timezone: Etc/UTC # http://en.wikipedia.org/wiki/List_of_tz_database_time_zones

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Mimic GitHub Pages with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive: false
tag_archive: false

# HTML Compression
# - http://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development
